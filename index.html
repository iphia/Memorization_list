<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="나만의학습장">
  <link rel="apple-touch-icon" href="icon.png">
  
  <title>나만의 심화 학습장 (바운스 스크롤 적용)</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f7f6;
      margin: 0;
      padding: 15px;
      padding-top: env(safe-area-inset-top, 15px);
      padding-bottom: env(safe-area-inset-bottom, 15px); 
      color: #333;
      display: flex;
      flex-direction: column;
      height: 100vh; 
      box-sizing: border-box;
      overflow: hidden; 
      overscroll-behavior: none; /* 🔥 전체 화면 바운스는 막고 아래 리스트만 바운스 되게! */
    }
    h1 {
      text-align: center;
      font-size: 22px;
      margin-top: 10px;
      margin-bottom: 20px;
      color: #1a1a1a;
      flex-shrink: 0; 
    }
    
    .folder-tabs {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      margin-bottom: 15px;
      padding-bottom: 5px;
      -ms-overflow-style: none;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .folder-tabs::-webkit-scrollbar {
      display: none;
    }
    .folder-tab {
      padding: 8px 16px;
      background-color: #e0e6ed;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      color: #555;
      transition: all 0.2s;
    }
    .folder-tab.active {
      background-color: #4A90E2;
      color: white;
      box-shadow: 0 3px 6px rgba(74, 144, 226, 0.3);
    }
    .folder-add {
      padding: 8px 16px;
      background-color: #fff;
      border: 1px dashed #aaa;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      color: #777;
    }

    #statusText {
      text-align: center;
      font-size: 13px;
      color: #7f8c8d;
      margin-bottom: 15px;
      font-weight: bold;
      flex-shrink: 0;
    }

    #swipeContainer {
      flex-grow: 1;
      width: 100%;
      overflow-y: auto; 
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch; 
    }
    #app {
      width: 100%;
      /* 🔥 여기서 1px의 마법! 내용이 적어도 무조건 스크롤 영역을 활성화시켜서 아이폰 바운스 효과를 냄 */
      min-height: calc(100% + 1px); 
      transition: transform 0.3s ease, opacity 0.3s ease;
      padding-bottom: 80px; 
    }

    .fab-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 990; 
      display: flex;
      flex-direction: column-reverse; 
      align-items: flex-end;
      gap: 15px;
      pointer-events: none; 
    }
    .fab-main {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: #4A90E2;
      color: white;
      font-size: 30px;
      font-weight: 300;
      border: none;
      box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
      cursor: pointer;
      transition: transform 0.3s ease, background-color 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      line-height: 1;
      padding-bottom: 4px; 
      pointer-events: auto; 
    }
    .fab-main.active {
      transform: rotate(45deg);
      background-color: #e74c3c; 
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
    }
    .fab-menu {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
      transition: all 0.3s ease;
      pointer-events: none; 
    }
    .fab-menu.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
      pointer-events: auto; 
    }
    .fab-item {
      padding: 12px 20px;
      border-radius: 30px;
      background-color: white;
      color: #333;
      border: 1px solid #eaeaea;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background-color 0.2s;
    }
    .fab-item:active {
      background-color: #f0f0f0;
    }

    .btn-small { margin-top: 10px; padding: 8px 10px; font-size: 12px; margin-left: 4px; border: none; border-radius: 6px; color: white; cursor: pointer; }
    .btn-move { background-color: #34495e; }
    .btn-edit { background-color: #f39c12; }
    .btn-hide { background-color: #8e44ad; }
    .btn-unhide { background-color: #2ecc71; }

    #modalOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 998;
      backdrop-filter: blur(2px); 
    }
    .modal-box {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90%; 
      max-width: 400px;
      background-color: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      z-index: 999;
      box-sizing: border-box;
    }
    .modal-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      margin-top: 0;
      text-align: center;
    }

    .btn-full { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; color: white; }
    .btn-full:last-child { margin-bottom: 0; }
    .bg-blue { background-color: #4A90E2; }
    .bg-red { background-color: #e74c3c; }
    .bg-gray { background-color: #95a5a6; }

    input[type="text"], textarea, select {
      width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd;
      border-radius: 6px; box-sizing: border-box; font-size: 16px; font-family: inherit;
    }
    textarea { height: 150px; resize: vertical; }
    
    .form-toolbar { display: flex; justify-content: flex-start; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .btn-tool { background-color: #34495e; color: white; padding: 6px 10px; font-size: 13px; border: none; border-radius: 4px; cursor: pointer; }
    
    .form-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
    .btn-save { background-color: #4A90E2; color: white; padding: 10px 15px; border:none; border-radius:8px; font-weight:bold; }
    .btn-cancel { background-color: #95a5a6; color: white; padding: 10px 15px; border:none; border-radius:8px; font-weight:bold; }

    #fileInput { display: none; }

    .accordion {
      background-color: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      margin-bottom: 12px; overflow: hidden; transition: all 0.3s ease;
    }
    .accordion.is-hidden-item { opacity: 0.7; border: 2px dashed #9b59b6; }
    .accordion-header {
      padding: 16px; font-size: 16px; font-weight: bold; background-color: #ffffff;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      -webkit-user-select: none; user-select: none;
    }
    .accordion.is-hidden-item .accordion-header { background-color: #fcf4ff; }
    .accordion-header:active { background-color: #f9f9f9; }
    .accordion-header::after { content: '▼'; font-size: 12px; color: #888; transition: transform 0.3s; }
    .accordion.active .accordion-header::after { transform: rotate(180deg); }
    .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background-color: #fafafa; }
    
    .content-inner { padding: 16px; border-top: 1px solid #eee; line-height: 1.6; font-size: 16px; }
    mark { background-color: #fff200; padding: 2px 4px; border-radius: 3px; font-weight: bold; }
    .table-container { overflow-x: auto; margin-top: 10px; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 280px; }
    th, td { border: 1px solid #e0e0e0; padding: 8px; text-align: left; }
    th { background-color: #4A90E2; color: white; }
    tr:nth-child(even) { background-color: #f8f9fa; }
    code { background-color: #eee; padding: 2px 5px; border-radius: 4px; color: #c0392b; }
    .action-buttons { text-align: right; margin-top: 10px; display: flex; flex-wrap: wrap; justify-content: flex-end; }
  </style>
</head>
<body>

  <h1>📚 나만의 심화 학습장</h1>

  <div class="folder-tabs" id="folderTabs"></div>
  <div id="statusText"></div>

  <div id="swipeContainer">
    <div id="app"></div>
  </div>

  <div class="fab-container">
    <button class="fab-main" id="fabMain">+</button>
    <div class="fab-menu" id="fabMenu">
      <button class="fab-item" id="showAddBtn">✍️ 새 내용 추가</button>
      <button class="fab-item" id="toggleHiddenBtn">👀 숨긴 항목 보기</button>
      <button class="fab-item" id="downloadBtn">📥 백업 다운로드</button>
      <button class="fab-item" id="uploadBtn">📤 백업 불러오기</button>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".json">

  <div id="modalOverlay"></div>

  <div id="addForm" class="modal-box">
    <h3 class="modal-title" id="modalTitle">새 내용 추가</h3>
    <input type="text" id="inputTitle" placeholder="제목을 입력하세요">
    <div class="form-toolbar">
      <button class="btn-tool" id="boldBtn"><b>B</b> 굵게</button>
      <button class="btn-tool" id="highlightBtn" style="background-color:#f1c40f; color:black; font-weight:bold;">🖍️ 형광펜</button>
      <button class="btn-tool" id="bulletBtn">• 들여쓰기</button>
      <button class="btn-tool" id="insertTableBtn">📝 표 넣기</button>
    </div>
    <textarea id="inputContent" placeholder="내용을 입력하세요."></textarea>
    <div class="form-buttons">
      <button class="btn btn-cancel" onclick="closeModals()">취소</button>
      <button class="btn btn-save" id="saveBtn">저장</button>
    </div>
  </div>

  <div id="folderManageModal" class="modal-box">
    <h3 class="modal-title">폴더 관리</h3>
    <input type="text" id="editFolderNameInput" placeholder="새 폴더 이름">
    <button class="btn-full bg-blue" id="btnRenameFolder">이름 변경하기</button>
    <button class="btn-full bg-red" id="btnDeleteFolderPrep">폴더 삭제하기</button>
    <button class="btn-full bg-gray" onclick="closeModals()">닫기</button>
  </div>

  <div id="folderDeleteModal" class="modal-box">
    <h3 class="modal-title">폴더 삭제</h3>
    <p style="font-size:14px; text-align:center; color:#555; line-height:1.5;">이 폴더 안에 있는 내용은<br>어떻게 할까요?</p>
    <button class="btn-full bg-blue" id="btnMoveToDefault">기본 노트로 모두 이동</button>
    <button class="btn-full bg-red" id="btnDeleteAllInside">내용까지 통째로 삭제</button>
    <button class="btn-full bg-gray" onclick="closeModals()">취소</button>
  </div>

  <div id="itemManageModal" class="modal-box">
    <h3 class="modal-title">항목 관리</h3>
    <p style="font-size:14px; text-align:center; color:#555; margin-bottom:5px;">다른 폴더로 이동</p>
    <select id="folderSelect"></select>
    <button class="btn-full bg-blue" id="btnMoveItem">선택한 폴더로 이동</button>
    <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
    <button class="btn-full bg-red" id="btnDeleteItem">🗑️ 이 항목 영구 삭제</button>
    <button class="btn-full bg-gray" onclick="closeModals()">닫기</button>
  </div>

  <script>
    const defaultData = [
      {
        folder: "기본 노트",
        title: "🎉 나만의 학습 앱 완벽 가이드!",
        content: "우리가 함께 만든 숨겨진 기능들을 정리해 줄게.<br><br>아래 설명들을 읽어보면 앱을 200% 활용할 수 있어!",
        hiddenUntil: null
      },
      {
        folder: "기본 노트",
        title: "🍎 쫀득한 바운스 스크롤",
        content: "내용이 적어도 화면을 위아래로 당겨보세요!<br>아이폰 특유의 쫀득하게 튕기는 바운스 스크롤 효과가 적용되어 진짜 앱처럼 느껴질 거예요.",
        hiddenUntil: null
      },
      {
        folder: "기본 노트",
        title: "📂 폴더 기능 완전 정복",
        content: "• <b>폴더 이동</b>: 위쪽 탭을 누르거나, 화면 빈 곳 <b>어디든 좌우로 스와이프</b>해봐!<br>• <b>폴더 관리</b>: 파랗게 켜진 현재 폴더 탭을 <b>한 번 더 터치</b>하면 폴더 이름을 바꾸거나 지울 수 있어.",
        hiddenUntil: null
      },
      {
        folder: "기본 노트",
        title: "👆 항목 꾹~ 누르기 (롱프레스)",
        content: "외울 항목(제목)을 <b>0.5초 동안 꾹~ 누르고 있어봐!</b><br><br>그러면 내용 안으로 들어가지 않고도 항목을 <b>다른 폴더로 이동</b>시키거나 <b>완전히 삭제</b>할 수 있는 깔끔한 관리 창이 나타나.",
        hiddenUntil: null
      },
      {
        folder: "기본 노트",
        title: "📝 글쓰기 도구 & 3일 감추기",
        content: "• 수정 창에서 드래그 후 <b>굵게, 형광펜</b>을 칠할 수 있고 <b>들여쓰기, 표 넣기</b>도 원터치야.<br>• 다 외운 건 <b>[⏱️ 감추기]</b>를 누르면 목록에서 사라졌다가 3일 뒤에 복습하라고 짠! 나타나.",
        hiddenUntil: null
      }
    ];

    let folders = JSON.parse(localStorage.getItem('myStudyFolders')) || ["기본 노트"];
    let studyData = JSON.parse(localStorage.getItem('myStudyApp'));
    
    if (!studyData || studyData.length === 0) {
      studyData = defaultData;
    } else {
      studyData.forEach(item => { if (!item.folder) item.folder = folders[0]; });
    }

    let currentFolderIndex = 0;
    let editingIndex = -1;
    let managingFolderIndex = -1;
    let managingItemIndex = -1;
    let isShowingHidden = false;

    const app = document.getElementById('app');
    const folderTabs = document.getElementById('folderTabs');
    const modalOverlay = document.getElementById('modalOverlay');
    const addForm = document.getElementById('addForm');
    const statusText = document.getElementById('statusText');

    const fabMain = document.getElementById('fabMain');
    const fabMenu = document.getElementById('fabMenu');

    fabMain.addEventListener('click', () => {
      fabMain.classList.toggle('active');
      fabMenu.classList.toggle('active');
    });

    function closeFab() {
      fabMain.classList.remove('active');
      fabMenu.classList.remove('active');
    }

    document.addEventListener('click', (event) => {
      const fabContainer = document.querySelector('.fab-container');
      if (!fabContainer.contains(event.target) && fabMain.classList.contains('active')) {
        closeFab();
      }
    });

    function saveToLocal() {
      localStorage.setItem('myStudyFolders', JSON.stringify(folders));
      localStorage.setItem('myStudyApp', JSON.stringify(studyData));
      renderFolders();
      renderList();
    }

    window.closeModals = function() {
      modalOverlay.style.display = 'none';
      addForm.style.display = 'none';
      document.getElementById('folderManageModal').style.display = 'none';
      document.getElementById('folderDeleteModal').style.display = 'none';
      document.getElementById('itemManageModal').style.display = 'none';
      managingFolderIndex = -1;
      managingItemIndex = -1;
      editingIndex = -1;
      closeFab(); 
    }

    modalOverlay.addEventListener('click', closeModals);

    function renderFolders() {
      folderTabs.innerHTML = '';
      folders.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'folder-tab ' + (i === currentFolderIndex ? 'active' : '');
        div.textContent = f;
        div.onclick = () => {
          if (i === currentFolderIndex) {
            managingFolderIndex = i;
            document.getElementById('editFolderNameInput').value = f;
            modalOverlay.style.display = 'block';
            document.getElementById('folderManageModal').style.display = 'block';
          } else {
            switchFolder(i);
          }
        };
        folderTabs.appendChild(div);
      });
      
      const addBtn = document.createElement('div');
      addBtn.className = 'folder-add';
      addBtn.textContent = '+ 새 폴더';
      addBtn.onclick = () => {
        const newName = prompt("새로운 폴더 이름을 입력하세요.");
        if (newName && newName.trim() !== '') {
          if (!folders.includes(newName.trim())) {
            folders.push(newName.trim());
            saveToLocal();
            switchFolder(folders.length - 1);
          } else {
            alert('이미 존재하는 폴더 이름입니다.');
          }
        }
      };
      folderTabs.appendChild(addBtn);
    }

    document.getElementById('btnRenameFolder').onclick = () => {
      const newName = document.getElementById('editFolderNameInput').value.trim();
      if(!newName) return alert('이름을 입력해주세요.');
      if(newName !== folders[managingFolderIndex] && folders.includes(newName)) return alert('이미 존재하는 폴더 이름입니다.');
      
      const oldName = folders[managingFolderIndex];
      folders[managingFolderIndex] = newName;
      studyData.forEach(item => { if(item.folder === oldName) item.folder = newName; });
      saveToLocal();
      closeModals();
    };

    document.getElementById('btnDeleteFolderPrep').onclick = () => {
      if(folders.length === 1) return alert('최소 1개의 폴더는 남아있어야 합니다.');
      document.getElementById('folderManageModal').style.display = 'none';
      document.getElementById('folderDeleteModal').style.display = 'block';
    };

    document.getElementById('btnMoveToDefault').onclick = () => {
      const oldName = folders[managingFolderIndex];
      if(!folders.includes('기본 노트')) folders.push('기본 노트');
      studyData.forEach(item => { if(item.folder === oldName) item.folder = '기본 노트'; });
      folders = folders.filter(f => f !== oldName);
      currentFolderIndex = folders.indexOf('기본 노트') !== -1 ? folders.indexOf('기본 노트') : 0;
      saveToLocal();
      closeModals();
    };

    document.getElementById('btnDeleteAllInside').onclick = () => {
      const oldName = folders[managingFolderIndex];
      studyData = studyData.filter(item => item.folder !== oldName);
      folders = folders.filter(f => f !== oldName);
      currentFolderIndex = Math.max(0, currentFolderIndex - 1);
      saveToLocal();
      closeModals();
    };

    function switchFolder(newIndex) {
      if (newIndex === currentFolderIndex) return;
      const direction = newIndex > currentFolderIndex ? 'left' : 'right';
      app.style.transform = direction === 'left' ? 'translateX(-50px)' : 'translateX(50px)';
      app.style.opacity = '0';
      setTimeout(() => {
        currentFolderIndex = newIndex;
        renderFolders();
        renderList();
        app.style.transition = 'none';
        app.style.transform = direction === 'left' ? 'translateX(50px)' : 'translateX(-50px)';
        app.offsetHeight; 
        app.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
        app.style.transform = 'translateX(0)';
        app.style.opacity = '1';
      }, 250);
    }

    function renderList() {
      app.innerHTML = '';
      const now = Date.now(); 
      let hiddenCount = 0;
      const currentFolderName = folders[currentFolderIndex];
      let visibleItems = [];

      studyData.forEach((item, originalIndex) => {
        if (item.folder === currentFolderName) {
          if (item.hiddenUntil && item.hiddenUntil > now) hiddenCount++;
          visibleItems.push({ item, originalIndex });
        }
      });

      if (hiddenCount > 0) {
        statusText.innerHTML = `현재 폴더에 숨김 처리된 항목이 <span style="color:#e74c3c;">${hiddenCount}개</span> 있습니다.`;
      } else {
        statusText.innerHTML = `현재 폴더에 숨김 처리된 항목이 없습니다.`;
      }

      visibleItems.forEach((dataObj, i) => {
        const { item, originalIndex } = dataObj;
        const isHidden = item.hiddenUntil && item.hiddenUntil > now;
        if (isHidden && !isShowingHidden) return; 

        const accordion = document.createElement('div');
        accordion.className = 'accordion';
        if (isHidden) accordion.classList.add('is-hidden-item'); 

        let displayContent = item.content.replace(/\n/g, '<br>');

        let buttonsHtml = '';
        if (i > 0) buttonsHtml += `<button class="btn btn-move btn-small" onclick="swapItems(${originalIndex}, ${visibleItems[i-1].originalIndex})">⬆️ 위로</button>`;
        if (i < visibleItems.length - 1) buttonsHtml += `<button class="btn btn-move btn-small" onclick="swapItems(${originalIndex}, ${visibleItems[i+1].originalIndex})">⬇️ 아래로</button>`;
        
        buttonsHtml += `<button class="btn btn-edit btn-small" onclick="editItem(${originalIndex})">✏️ 수정</button>`;
        
        if (isHidden) {
          buttonsHtml += `<button class="btn btn-unhide btn-small" onclick="unhideItem(${originalIndex})">👁️ 숨김 해제</button>`;
        } else {
          buttonsHtml += `<button class="btn btn-hide btn-small" onclick="hideItem(${originalIndex})">⏱️ 감추기</button>`;
        }

        accordion.innerHTML = `
          <div class="accordion-header">
            ${isHidden ? '🙈 [숨김 중] ' : ''}${item.title}
          </div>
          <div class="accordion-content">
            <div class="content-inner">
              ${displayContent}
              <div class="action-buttons">
                ${buttonsHtml}
              </div>
            </div>
          </div>
        `;
        app.appendChild(accordion);

        const header = accordion.querySelector('.accordion-header');
        const content = accordion.querySelector('.accordion-content');

        let pressTimer;
        let isLongPress = false;

        const startPress = () => {
          isLongPress = false;
          pressTimer = setTimeout(() => {
            isLongPress = true;
            openItemManageModal(originalIndex);
          }, 500); 
        };
        const cancelPress = () => clearTimeout(pressTimer);

        header.addEventListener('touchstart', startPress, {passive: true});
        header.addEventListener('touchmove', cancelPress, {passive: true});
        header.addEventListener('touchend', cancelPress);
        
        header.addEventListener('mousedown', startPress);
        header.addEventListener('mousemove', cancelPress);
        header.addEventListener('mouseup', cancelPress);
        header.addEventListener('mouseleave', cancelPress);

        header.addEventListener('click', (e) => {
          if (isLongPress) {
            e.preventDefault();
            return;
          }
          const isActive = accordion.classList.contains('active');
          if (!isActive) {
            accordion.classList.add('active');
            content.style.maxHeight = content.scrollHeight + 100 + "px"; 
          } else {
            accordion.classList.remove('active');
            content.style.maxHeight = null;
          }
        });
      });
    }

    function openItemManageModal(index) {
      managingItemIndex = index;
      const select = document.getElementById('folderSelect');
      select.innerHTML = '';
      folders.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f;
        opt.textContent = f;
        if(f === studyData[index].folder) opt.selected = true;
        select.appendChild(opt);
      });
      modalOverlay.style.display = 'block';
      document.getElementById('itemManageModal').style.display = 'block';
    }

    document.getElementById('btnMoveItem').onclick = () => {
      const newFolder = document.getElementById('folderSelect').value;
      studyData[managingItemIndex].folder = newFolder;
      saveToLocal();
      closeModals();
    };

    document.getElementById('btnDeleteItem').onclick = () => {
      if(confirm('이 항목을 정말 영구 삭제할까요?')) {
        studyData.splice(managingItemIndex, 1);
        saveToLocal();
        closeModals();
      }
    };

    let touchstartX = 0;
    let touchstartY = 0;
    let touchendX = 0;
    let touchendY = 0;
    const swipeContainer = document.getElementById('swipeContainer');
    
    swipeContainer.addEventListener('touchstart', e => { 
      touchstartX = e.changedTouches[0].screenX; 
      touchstartY = e.changedTouches[0].screenY; 
    }, {passive: true});
    
    swipeContainer.addEventListener('touchend', e => {
      touchendX = e.changedTouches[0].screenX;
      touchendY = e.changedTouches[0].screenY;
      
      const diffX = Math.abs(touchendX - touchstartX);
      const diffY = Math.abs(touchendY - touchstartY);
      
      if (diffX > 60 && diffX > diffY) {
        if (touchendX < touchstartX && currentFolderIndex < folders.length - 1) switchFolder(currentFolderIndex + 1);
        if (touchendX > touchstartX && currentFolderIndex > 0) switchFolder(currentFolderIndex - 1);
      }
    }, {passive: true});

    document.getElementById('showAddBtn').addEventListener('click', () => {
      closeFab();
      document.getElementById('inputTitle').value = '';
      document.getElementById('inputContent').value = '';
      document.getElementById('modalTitle').textContent = '새 내용 추가';
      document.getElementById('saveBtn').textContent = '저장';
      modalOverlay.style.display = 'block';
      document.getElementById('addForm').style.display = 'block';
    });

    document.getElementById('toggleHiddenBtn').addEventListener('click', () => {
      closeFab();
      isShowingHidden = !isShowingHidden;
      document.getElementById('toggleHiddenBtn').innerHTML = isShowingHidden ? '🙈 닫기 (숨긴 항목)' : '👀 숨긴 항목 보기';
      renderList();
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      closeFab();
      const blob = new Blob([JSON.stringify({folders: folders, data: studyData}, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = "my_study_backup.json"; a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('uploadBtn').addEventListener('click', () => {
      closeFab();
      document.getElementById('fileInput').click();
    });

    window.swapItems = function(indexA, indexB) {
      const temp = studyData[indexA];
      studyData[indexA] = studyData[indexB];
      studyData[indexB] = temp;
      saveToLocal();
    };

    window.editItem = function(index) {
      editingIndex = index;
      document.getElementById('inputTitle').value = studyData[index].title;
      document.getElementById('inputContent').value = studyData[index].content;
      document.getElementById('modalTitle').textContent = '내용 수정하기';
      document.getElementById('saveBtn').textContent = '수정 완료'; 
      modalOverlay.style.display = 'block';
      document.getElementById('addForm').style.display = 'block';
    };

    window.hideItem = function(index) {
      if(confirm('이 내용을 3일 동안 숨기시겠습니까?')) {
        studyData[index].hiddenUntil = Date.now() + (3 * 24 * 60 * 60 * 1000);
        saveToLocal();
      }
    };

    window.unhideItem = function(index) { studyData[index].hiddenUntil = null; saveToLocal(); };

    document.getElementById('boldBtn').addEventListener('click', () => {
      const el = document.getElementById('inputContent');
      const s = el.selectionStart, e = el.selectionEnd, t = el.value;
      const wrap = `<b>${t.substring(s, e)}</b>`;
      el.value = t.substring(0, s) + wrap + t.substring(e);
      el.focus();
      el.selectionStart = s === e ? s + 3 : s;
      el.selectionEnd = s === e ? s + 3 : s + wrap.length;
    });

    document.getElementById('highlightBtn').addEventListener('click', () => {
      const el = document.getElementById('inputContent');
      const s = el.selectionStart, e = el.selectionEnd, t = el.value;
      const wrap = `<mark>${t.substring(s, e)}</mark>`;
      el.value = t.substring(0, s) + wrap + t.substring(e);
      el.focus();
      el.selectionStart = s === e ? s + 6 : s;
      el.selectionEnd = s === e ? s + 6 : s + wrap.length;
    });

    document.getElementById('bulletBtn').addEventListener('click', () => {
      const el = document.getElementById('inputContent');
      const pos = el.selectionStart, t = el.value;
      const lineStart = t.lastIndexOf('\n', pos - 1) === -1 ? 0 : t.lastIndexOf('\n', pos - 1) + 1;
      el.value = t.substring(0, lineStart) + "&nbsp; • " + t.substring(lineStart);
      el.focus();
      el.selectionStart = el.selectionEnd = pos + 8;
    });

    document.getElementById('insertTableBtn').addEventListener('click', () => {
      const el = document.getElementById('inputContent');
      const tb = `\n<div class="table-container">\n  <table>\n    <tr>\n      <th>구분</th>\n      <th>제목1</th>\n      <th>제목2</th>\n    </tr>\n    <tr>\n      <td>항목1</td>\n      <td>내용1</td>\n      <td>내용2</td>\n    </tr>\n  </table>\n</div>\n`;
      const s = el.selectionStart, t = el.value;
      el.value = t.substring(0, s) + tb + t.substring(s);
      el.focus();
      el.selectionStart = el.selectionEnd = s + tb.length;
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      const t = document.getElementById('inputTitle').value;
      const c = document.getElementById('inputContent').value;
      if (!t || !c) return alert('제목과 내용을 모두 입력해주세요!');
      
      if (editingIndex > -1) {
        studyData[editingIndex].title = t;
        studyData[editingIndex].content = c;
      } else {
        studyData.unshift({ folder: folders[currentFolderIndex], title: t, content: c, hiddenUntil: null });
      }
      saveToLocal();
      closeModals();
    });

    document.getElementById('fileInput').addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const up = JSON.parse(e.target.result);
          if (Array.isArray(up)) {
            studyData = up; folders = ["기본 노트"];
            studyData.forEach(item => { if(!item.folder) item.folder = "기본 노트"; });
          } else if (up.folders && up.data) {
            folders = up.folders; studyData = up.data;
          } else throw new Error();
          currentFolderIndex = 0; saveToLocal(); alert('백업 데이터를 불러왔습니다!');
        } catch { alert('잘못된 백업 파일입니다.'); }
      };
      reader.readAsText(file);
      document.getElementById('fileInput').value = '';
    });

    renderFolders();
    renderList();
  </script>

</body>
</html>
